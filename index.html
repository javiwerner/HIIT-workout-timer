<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Timer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f0f0f;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
    transition: background 0.3s, color 0.3s;
  }

  /* ── WARMUP OVERLAY ── */
  #warmup-overlay {
    position: fixed;
    inset: 0;
    background: #0f0f0f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 400;
    padding: 40px 24px;
    overflow-y: auto;
  }

  #warmup-overlay h2 {
    font-size: 1rem;
    letter-spacing: 0.3em;
    color: #888;
    text-transform: uppercase;
    margin-bottom: 40px;
  }

  .warmup-section {
    width: min(560px, 100%);
    margin-bottom: 40px;
  }

  .warmup-section-title {
    font-size: 0.85rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #4caf50;
    font-weight: 700;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 2px solid #4caf50;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .warmup-prescription {
    font-size: 0.95rem;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,0.55);
    font-weight: 600;
    text-transform: uppercase;
  }

  .warmup-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .warmup-list li {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 2rem;
    font-weight: 600;
    color: #fff;
    letter-spacing: 0.02em;
  }

  .warmup-list li::before {
    content: '';
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #4caf50;
    flex-shrink: 0;
  }

  #btn-start-workout {
    margin-top: 8px;
    padding: 18px 56px;
    background: #4caf50;
    color: #000;
    border: none;
    border-radius: 10px;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
    text-transform: uppercase;
  }

  #btn-start-workout:active { transform: scale(0.97); }

  /* ── SETUP OVERLAY ── */
  #setup-overlay {
    position: fixed;
    inset: 0;
    background: #0f0f0f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 300;
    padding: 40px 24px;
    overflow-y: auto;
  }

  #setup-overlay h2 {
    font-size: 1rem;
    letter-spacing: 0.25em;
    color: #666;
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  .var-btns {
    display: flex;
    gap: 16px;
    margin-bottom: 36px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .var-btn {
    padding: 16px 32px;
    border-radius: 10px;
    border: 2px solid #333;
    background: transparent;
    color: #888;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.2s;
    min-width: 180px;
  }

  .var-btn:hover { border-color: #555; color: #ccc; }
  .var-btn.selected { border-color: #4caf50; color: #4caf50; background: rgba(76,175,80,0.08); }

  #station-inputs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    width: min(580px, 100%);
    margin-bottom: 32px;
  }

  .stn-input-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    padding: 10px 14px;
  }

  .stn-input-num {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: #2a2a2a;
    color: #666;
    font-size: 0.75rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .stn-input-field {
    background: transparent;
    border: none;
    outline: none;
    color: #fff;
    font-size: 0.85rem;
    font-family: inherit;
    width: 100%;
  }

  .stn-input-field::placeholder { color: #444; }

  #btn-confirm {
    padding: 16px 56px;
    background: #4caf50;
    color: #000;
    border: none;
    border-radius: 10px;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
    opacity: 0.4;
    pointer-events: none;
  }

  #btn-confirm.ready { opacity: 1; pointer-events: auto; }
  #btn-confirm.ready:active { transform: scale(0.97); }

  /* ── STATION PANELS (fixed left & right) ── */
  .stn-panel {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 300px;
    z-index: 10;
  }

  #station-left  { left: 24px; }
  #station-right { right: 24px; }

  .stn-item {
    display: flex;
    align-items: center;
    gap: 14px;
    background: rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 16px 18px;
    transition: background 0.3s;
  }

  .stn-badge {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
    transition: background 0.3s, color 0.3s;
  }

  .stn-name {
    font-size: 1.15rem;
    font-weight: 600;
    color: #fff;
    letter-spacing: 0.01em;
    line-height: 1.3;
    transition: color 0.3s;
  }

  /* Station panels on light backgrounds */
  body.theme-final     .stn-item,
  body.theme-rest      .stn-item,
  body.theme-roundrest .stn-item { background: rgba(0,0,0,0.15); }

  body.theme-final     .stn-badge,
  body.theme-rest      .stn-badge,
  body.theme-roundrest .stn-badge { background: rgba(0,0,0,0.2); color: rgba(0,0,0,0.85); }

  body.theme-final     .stn-name,
  body.theme-rest      .stn-name,
  body.theme-roundrest .stn-name { color: rgba(0,0,0,0.85); }

  body.theme-idle .stn-item  { background: #222; }
  body.theme-idle .stn-badge { background: #333; color: #bbb; }
  body.theme-idle .stn-name  { color: #ccc; }

  /* ── PHASE LABEL ── */
  #phase-label {
    font-size: clamp(3rem, 12vw, 6rem);
    font-weight: 900;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: color 0.3s;
    margin-bottom: 24px;
    line-height: 1;
  }

  #sub-label {
    font-size: 1.4rem;
    font-weight: 600;
    color: #ccc;
    letter-spacing: 0.08em;
    margin-bottom: 24px;
    height: 1.6em;
  }

  body.theme-final     #sub-label,
  body.theme-rest      #sub-label,
  body.theme-roundrest #sub-label { color: rgba(0,0,0,0.7); }

  #clock {
    font-size: clamp(7rem, 26vw, 13rem);
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    margin-bottom: 24px;
    transition: color 0.3s;
  }

  /* ── MOTIVATIONAL FLASH ── */
  #flash {
    height: 3rem;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
    pointer-events: none;
  }

  #flash-text {
    font-size: clamp(1.1rem, 4vw, 1.6rem);
    font-weight: 900;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0;
    text-align: center;
  }

  #flash-text.show { animation: flash-anim 2.2s ease forwards; }

  @keyframes flash-anim {
    0%   { opacity: 0; transform: translateY(6px); }
    12%  { opacity: 1; transform: translateY(0); }
    72%  { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(-4px); }
  }

  /* ── LAST ROUND PULSE ── */
  @keyframes last-round-pulse {
    0%, 100% { filter: brightness(1); }
    50%      { filter: brightness(1.18); }
  }
  body.last-round { animation: last-round-pulse 1.6s ease-in-out infinite; }

  /* ── INTERVAL BLOCKS ── */
  #interval-wrap {
    display: flex;
    gap: 12px;
    margin-bottom: 28px;
  }

  .interval-block {
    width: 64px;
    height: 64px;
    border-radius: 10px;
    background: #2a2a2a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    font-weight: 800;
    color: #666;
    transition: background 0.3s, color 0.3s, transform 0.2s;
  }

  .interval-block.done   { background: rgba(255,255,255,0.3); color: rgba(255,255,255,0.9); }
  .interval-block.active { background: #fff; color: #111; transform: scale(1.12); }

  body.theme-final  .interval-block { background: rgba(0,0,0,0.15); color: rgba(0,0,0,0.35); }
  body.theme-final  .interval-block.done { background: rgba(0,0,0,0.3); color: rgba(0,0,0,0.7); }
  body.theme-final  .interval-block.active { background: rgba(0,0,0,0.8); color: #fff; transform: scale(1.12); }

  body.theme-rest   .interval-block { background: rgba(0,0,0,0.12); color: rgba(0,0,0,0.35); }
  body.theme-rest   .interval-block.done { background: rgba(0,0,0,0.3); color: rgba(0,0,0,0.75); }
  body.theme-rest   .interval-block.active { background: rgba(0,0,0,0.75); color: #fff; transform: scale(1.12); }

  body.theme-roundrest .interval-block { background: rgba(0,0,0,0.12); color: rgba(0,0,0,0.35); }
  body.theme-roundrest .interval-block.done { background: rgba(0,0,0,0.3); color: rgba(0,0,0,0.75); }

  /* ── BUTTONS ── */
  .btn-row { display: flex; gap: 16px; }

  button {
    padding: 14px 36px;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: opacity 0.2s, transform 0.1s;
  }

  button:active { transform: scale(0.97); }

  #btn-start { background: #4caf50; color: #000; min-width: 120px; }
  #btn-skip  { background: #1a1a2e; color: #7c83fd; border: 2px solid #7c83fd; }
  #btn-reset { background: #333; color: #ccc; }

  #btn-audio {
    position: fixed;
    top: 20px; right: 20px;
    width: 48px; height: 48px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    border: 2px solid rgba(255,255,255,0.2);
    color: #fff;
    font-size: 1.3rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    padding: 0;
    transition: background 0.2s, opacity 0.2s;
    z-index: 200;
  }
  #btn-audio.muted { opacity: 0.4; }
  body.theme-final  #btn-audio,
  body.theme-rest   #btn-audio,
  body.theme-roundrest #btn-audio { color: #333; border-color: rgba(0,0,0,0.2); background: rgba(0,0,0,0.08); }

  /* ── END CELEBRATION ── */
  @keyframes celebrate {
    0%   { opacity: 0; transform: scale(0.4); }
    55%  { opacity: 1; transform: scale(1.08); }
    75%  { transform: scale(0.96); }
    100% { opacity: 1; transform: scale(1); }
  }

  #done-msg {
    display: none;
    font-size: clamp(2.5rem, 10vw, 5rem);
    font-weight: 900;
    color: #4caf50;
    letter-spacing: 0.08em;
    text-align: center;
    line-height: 1.3;
  }
  #done-msg.show { display: block; animation: celebrate 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

  #done-sub { font-size: 1rem; color: #666; letter-spacing: 0.1em; margin-top: 12px; text-align: center; }

  /* ── COLOR THEMES ── */
  body.theme-work { background: #2e7d32; color: #fff; }
  body.theme-work #clock, body.theme-work #phase-label { color: #fff; }
  body.theme-work #sub-label { color: rgba(255,255,255,0.7); }
  body.theme-work #btn-reset { background: rgba(0,0,0,0.2); color: rgba(255,255,255,0.85); }
  body.theme-work #btn-skip  { background: transparent; border-color: rgba(255,255,255,0.6); color: rgba(255,255,255,0.85); }

  body.theme-final { background: #f9a825; color: #1a1a1a; }
  body.theme-final #clock, body.theme-final #phase-label { color: #1a1a1a; }
  body.theme-final #sub-label { color: rgba(0,0,0,0.55); }
  body.theme-final #btn-reset { background: rgba(0,0,0,0.15); color: #1a1a1a; }
  body.theme-final #btn-skip  { background: transparent; border-color: rgba(0,0,0,0.4); color: #1a1a1a; }

  body.theme-last { background: #1565c0; color: #fff; }
  body.theme-last #clock, body.theme-last #phase-label { color: #fff; }
  body.theme-last #sub-label { color: rgba(255,255,255,0.7); }
  body.theme-last #btn-reset { background: rgba(0,0,0,0.2); color: rgba(255,255,255,0.85); }
  body.theme-last #btn-skip  { background: transparent; border-color: rgba(255,255,255,0.6); color: rgba(255,255,255,0.85); }

  body.theme-rest { background: #e0e0e0; color: #222; }
  body.theme-rest #clock, body.theme-rest #phase-label { color: #333; }
  body.theme-rest #sub-label { color: #666; }
  body.theme-rest #btn-start { background: #4caf50; color: #fff; }
  body.theme-rest #btn-reset { background: #ccc; color: #444; }
  body.theme-rest #btn-skip  { background: transparent; border-color: #999; color: #444; }

  body.theme-roundrest { background: #9e9e9e; color: #111; }
  body.theme-roundrest #clock, body.theme-roundrest #phase-label { color: #111; }
  body.theme-roundrest #sub-label { color: rgba(0,0,0,0.5); }
  body.theme-roundrest #btn-start { background: #4caf50; color: #fff; }
  body.theme-roundrest #btn-reset { background: rgba(0,0,0,0.15); color: #222; }
  body.theme-roundrest #btn-skip  { background: transparent; border-color: rgba(0,0,0,0.4); color: #222; }

  body.theme-idle #clock { color: #888; }
</style>
</head>
<body class="theme-idle">

<!-- ── WARMUP OVERLAY ── -->
<div id="warmup-overlay">
  <h2>Warm Up</h2>

  <div class="warmup-section">
    <div class="warmup-section-title">Mobility <span class="warmup-prescription">2 rounds × 5 reps</span></div>
    <ul class="warmup-list">
      <li>Squat to Stand</li>
      <li>Cobra</li>
      <li>World's Greatest</li>
      <li>Inchworm to Push-up</li>
    </ul>
  </div>

  <div class="warmup-section">
    <div class="warmup-section-title">Dynamic <span class="warmup-prescription">2 rounds × 10 reps</span></div>
    <ul class="warmup-list">
      <li>Lunge Twist</li>
      <li>High Knees</li>
      <li>Butt Kicks</li>
      <li>Alternating Arm Raising</li>
    </ul>
  </div>

  <button id="btn-start-workout">Start Workout →</button>
</div>

<!-- ── SETUP OVERLAY ── -->
<div id="setup-overlay">
  <h2>Select Workout</h2>
  <div class="var-btns">
    <button class="var-btn" id="var-btn-1">Variation 1</button>
    <button class="var-btn" id="var-btn-2">Variation 2</button>
  </div>
  <div id="station-inputs">
    <!-- built by JS -->
  </div>
  <button id="btn-confirm">CONFIRM</button>
</div>

<!-- Audio toggle -->
<button id="btn-audio" title="Toggle audio">🔊</button>

<div id="phase-label">READY</div>
<div id="sub-label"></div>
<div id="clock">0:30</div>

<div id="flash"><span id="flash-text"></span></div>

<div id="interval-wrap"></div>

<!-- Station panels — fixed left & right during workout -->
<div id="station-left"  class="stn-panel"></div>
<div id="station-right" class="stn-panel"></div>

<div class="btn-row">
  <button id="btn-start">START</button>
  <button id="btn-skip">SKIP</button>
  <button id="btn-reset">RESET</button>
</div>

<div id="done-msg">WORKOUT<br>COMPLETE</div>
<div id="done-sub"></div>

<script>
// ── CONFIG ─────────────────────────────────────────────────────────────────
const TOTAL_ROUNDS   = 12;
const WORK_ON        = 30;
const WORK_OFF       = 10;
const ROUND_REST     = 60;
const WORK_INTERVALS = 4;
const HALFWAY_ROUND  = Math.floor(TOTAL_ROUNDS / 2) + 1;

const VARIATIONS = [
  [
    "Burpee",
    "Med Ball Slams (alternating)",
    "Jumping Jacks (clap on thighs)",
    "Pushup Climbers — 2 push-ups + 10 climbers",
    "Jump Rope",
    "Med Ball Thrusters"
  ],
  [
    "Row Erg (2:30 continuous)",
    "Split Jumps",
    "Battle Rope",
    "Sled Push",
    "Leg Flutters",
    "Push-up w/ Arm Taps"
  ]
];

// ── BUILD PHASES ───────────────────────────────────────────────────────────
function buildRound(round) {
  const phases = [];
  for (let i = 0; i < WORK_INTERVALS; i++) {
    phases.push({ type: 'work', duration: WORK_ON, interval: i + 1 });
    if (i < WORK_INTERVALS - 1)
      phases.push({ type: 'workrest', duration: WORK_OFF, interval: i + 1 });
  }
  if (round < TOTAL_ROUNDS)
    phases.push({ type: 'roundrest', duration: ROUND_REST, interval: null });
  return phases;
}

let allPhases = [];
for (let r = 1; r <= TOTAL_ROUNDS; r++)
  buildRound(r).forEach(p => allPhases.push({ ...p, round: r }));

// ── STATE ──────────────────────────────────────────────────────────────────
let phaseIndex   = 0;
let timeLeft     = 0;
let running      = false;
let finished     = false;
let ticker       = null;
let audioOn      = true;
let stationNames = [];

const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx   = null;

// ── DOM REFS ───────────────────────────────────────────────────────────────
const warmupOverlay = document.getElementById('warmup-overlay');
const setupOverlay  = document.getElementById('setup-overlay');
setupOverlay.style.display = 'none'; // hidden until warmup is dismissed
const stationInputs = document.getElementById('station-inputs');
const btnConfirm    = document.getElementById('btn-confirm');
const clockEl       = document.getElementById('clock');
const phaseEl       = document.getElementById('phase-label');
const subEl         = document.getElementById('sub-label');
const flashTextEl   = document.getElementById('flash-text');
const intervalWrap  = document.getElementById('interval-wrap');
const stationLeft   = document.getElementById('station-left');
const stationRight  = document.getElementById('station-right');
const btnStart      = document.getElementById('btn-start');
const btnSkip       = document.getElementById('btn-skip');
const btnReset      = document.getElementById('btn-reset');
const btnAudio      = document.getElementById('btn-audio');
const doneMsg       = document.getElementById('done-msg');
const doneSub       = document.getElementById('done-sub');

// ── SETUP SCREEN ───────────────────────────────────────────────────────────
let selectedVariation = null;

// Build 6 inputs
for (let i = 1; i <= 6; i++) {
  const wrap = document.createElement('div');
  wrap.className = 'stn-input-wrap';
  wrap.innerHTML = `
    <div class="stn-input-num">${i}</div>
    <input class="stn-input-field" id="stn-input-${i}" placeholder="Station ${i}" type="text">
  `;
  stationInputs.appendChild(wrap);
}

function selectVariation(idx) {
  selectedVariation = idx;
  document.querySelectorAll('.var-btn').forEach((b, i) =>
    b.classList.toggle('selected', i === idx));
  VARIATIONS[idx].forEach((name, i) => {
    document.getElementById(`stn-input-${i + 1}`).value = name;
  });
  btnConfirm.classList.add('ready');
}

document.getElementById('var-btn-1').addEventListener('click', () => selectVariation(0));
document.getElementById('var-btn-2').addEventListener('click', () => selectVariation(1));

// Allow manual edits to also unlock confirm
stationInputs.addEventListener('input', () => {
  const anyFilled = [...stationInputs.querySelectorAll('.stn-input-field')]
    .some(f => f.value.trim());
  btnConfirm.classList.toggle('ready', anyFilled);
});

document.getElementById('btn-start-workout').addEventListener('click', () => {
  warmupOverlay.style.display = 'none';
  setupOverlay.style.display = 'flex';
});

btnConfirm.addEventListener('click', () => {
  stationNames = Array.from({ length: 6 }, (_, i) =>
    document.getElementById(`stn-input-${i + 1}`).value.trim() || `Station ${i + 1}`
  );
  buildStationGrid();
  setupOverlay.style.display = 'none';
  renderIdle();
});

function buildStationGrid() {
  stationLeft.innerHTML = '';
  stationRight.innerHTML = '';
  stationNames.forEach((name, i) => {
    const item = document.createElement('div');
    item.className = 'stn-item';
    item.innerHTML = `<div class="stn-badge">${i + 1}</div><div class="stn-name">${name}</div>`;
    (i < 3 ? stationLeft : stationRight).appendChild(item);
  });
}

// ── INTERVAL BLOCKS ────────────────────────────────────────────────────────
for (let i = 1; i <= WORK_INTERVALS; i++) {
  const b = document.createElement('div');
  b.className = 'interval-block';
  b.id = `iblock-${i}`;
  b.textContent = i;
  intervalWrap.appendChild(b);
}

// ── AUDIO ──────────────────────────────────────────────────────────────────
function ensureAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function beep(freq, dur, vol = 0.4, wave = 'sine') {
  if (!audioOn) return;
  try {
    ensureAudio();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = wave;
    o.frequency.value = freq;
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.start(); o.stop(audioCtx.currentTime + dur);
  } catch(e) {}
}

function speak(text, delay = 0) {
  if (!audioOn || !window.speechSynthesis) return;
  setTimeout(() => {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 1.15; u.pitch = 1.1; u.volume = 1;
    window.speechSynthesis.speak(u);
  }, delay);
}

function soundStart()     { beep(880, 0.12); setTimeout(() => beep(1100, 0.18), 120); }
function soundRest()      { beep(440, 0.25); }
function soundRoundRest() { beep(330, 0.15); setTimeout(() => beep(440, 0.35), 160); }
function soundCountdown() { beep(660, 0.08, 0.25); }
function soundDone()      { [0,120,250,400].forEach((t,i) => setTimeout(() => beep(523+i*100, 0.25), t)); }

// ── MOTIVATIONAL FLASHES ───────────────────────────────────────────────────
const WORK_MSGS = ["LET'S GO!", "PUSH IT!", "DRIVE!", "EARN IT!", "DIG IN!", "MOVE!"];
let lastMsgIdx = -1;

function randomWorkMsg() {
  let idx;
  do { idx = Math.floor(Math.random() * WORK_MSGS.length); } while (idx === lastMsgIdx);
  lastMsgIdx = idx;
  return WORK_MSGS[idx];
}

function flash(text, color = '#fff') {
  flashTextEl.style.color = color;
  flashTextEl.textContent = text;
  flashTextEl.classList.remove('show');
  void flashTextEl.offsetWidth;
  flashTextEl.classList.add('show');
}

function getWorkFlash(phase) {
  const isLast = phase.round === TOTAL_ROUNDS;
  const isFinalInterval = phase.interval === WORK_INTERVALS;
  if (isLast && isFinalInterval)          return { text: "GIVE IT EVERYTHING!", color: '#fff' };
  if (isLast && phase.interval === 1)     return { text: "LAST ROUND!", color: '#fff' };
  if (phase.round === HALFWAY_ROUND && phase.interval === 1) return { text: "HALFWAY THERE!", color: '#fff' };
  if (isFinalInterval)                    return { text: "FINAL PUSH!", color: '#fff' };
  return { text: randomWorkMsg(), color: '#fff' };
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function fmt(s) {
  return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
}

function render() {
  if (finished) return;
  const phase = allPhases[phaseIndex];
  clockEl.textContent = fmt(timeLeft);
  const isLastRound = phase.round === TOTAL_ROUNDS;

  if (phase.type === 'work') {
    const isFinal = phase.interval === WORK_INTERVALS;
    const isLast  = isFinal && isLastRound;
    document.body.className = (isLast ? 'theme-last' : isFinal ? 'theme-final' : 'theme-work')
      + (isLastRound ? ' last-round' : '');
    phaseEl.textContent = isFinal ? 'FINAL INTERVAL' : 'WORK';
    subEl.textContent   = `Round ${phase.round} of ${TOTAL_ROUNDS}  ·  Interval ${phase.interval} of ${WORK_INTERVALS}`;
  } else if (phase.type === 'workrest') {
    document.body.className = 'theme-rest' + (isLastRound ? ' last-round' : '');
    phaseEl.textContent = 'REST';
    subEl.textContent   = `Round ${phase.round}  ·  Next interval in ${timeLeft}s`;
  } else {
    document.body.className = 'theme-roundrest';
    phaseEl.textContent = 'ROTATE STATIONS';
    subEl.textContent   = `Round ${phase.round} complete  ·  Round ${phase.round + 1} up next`;
  }

  for (let i = 1; i <= WORK_INTERVALS; i++) {
    const b = document.getElementById(`iblock-${i}`);
    if (phase.type === 'roundrest') {
      b.className = 'interval-block done';
    } else {
      b.className = 'interval-block' +
        (i < phase.interval ? ' done' :
         i === phase.interval && phase.type === 'work' ? ' active' : '');
    }
  }
}

function renderIdle() {
  document.body.className = 'theme-idle';
  phaseEl.textContent = 'READY';
  subEl.textContent = `${TOTAL_ROUNDS} rounds  ·  ${WORK_INTERVALS}×${WORK_ON}s work / ${WORK_OFF}s rest  ·  ${ROUND_REST}s between rounds`;
  clockEl.textContent = fmt(WORK_ON);
  for (let i = 1; i <= WORK_INTERVALS; i++)
    document.getElementById(`iblock-${i}`).className = 'interval-block';
}

// ── TICK ───────────────────────────────────────────────────────────────────
function tick() {
  if (timeLeft <= 3 && timeLeft > 0) { soundCountdown(); speak(String(timeLeft)); }
  timeLeft--;
  if (timeLeft < 0) {
    phaseIndex++;
    if (phaseIndex >= allPhases.length) { finish(); return; }
    timeLeft = allPhases[phaseIndex].duration;
    const p = allPhases[phaseIndex];
    if (p.type === 'work') {
      soundStart(); speak('Go', 150);
      const f = getWorkFlash(p); flash(f.text, f.color);
    } else if (p.type === 'workrest') {
      soundRest();
    } else {
      soundRoundRest();
      const nextRound = p.round + 1;
      if (nextRound === HALFWAY_ROUND) speak('Halfway there. Keep pushing.', 800);
      else if (nextRound === TOTAL_ROUNDS) speak('Last round. Give everything.', 800);
    }
  }
  render();
}

// ── CONTROLS ───────────────────────────────────────────────────────────────
function start() {
  if (finished) return;
  ensureAudio();
  if (!running) {
    running = true;
    btnStart.textContent = 'PAUSE';
    if (timeLeft === 0) {
      phaseIndex = 0;
      timeLeft = allPhases[0].duration;
      soundStart(); speak('Go', 150);
      flash(randomWorkMsg());
      render();
    }
    ticker = setInterval(tick, 1000);
  } else { pause(); }
}

function pause() {
  running = false;
  clearInterval(ticker);
  btnStart.textContent = 'RESUME';
}

function skip() {
  if (finished) return;
  if (timeLeft === 0) {
    phaseIndex = 0;
    timeLeft = allPhases[0].duration;
    render(); return;
  }
  phaseIndex++;
  if (phaseIndex >= allPhases.length) { finish(); return; }
  timeLeft = allPhases[phaseIndex].duration;
  const p = allPhases[phaseIndex];
  if (p.type === 'work') soundStart();
  else if (p.type === 'workrest') soundRest();
  else soundRoundRest();
  render();
}

function reset() {
  clearInterval(ticker);
  window.speechSynthesis && window.speechSynthesis.cancel();
  running = false; finished = false;
  phaseIndex = 0; timeLeft = 0;
  btnStart.textContent = 'START';
  btnStart.style.display = '';
  doneMsg.className = '';
  doneMsg.style.display = 'none';
  doneSub.textContent = '';
  setupOverlay.style.display = 'flex';
}

function finish() {
  clearInterval(ticker);
  running = false; finished = true;
  soundDone();
  speak('Workout complete. Outstanding effort!', 400);
  document.body.className = 'theme-idle';
  phaseEl.textContent = '';
  subEl.textContent = '';
  clockEl.textContent = '';
  btnStart.style.display = 'none';
  doneMsg.style.display = 'none';
  requestAnimationFrame(() => {
    doneMsg.classList.add('show');
    doneSub.textContent = `${TOTAL_ROUNDS} rounds completed`;
  });
}

function toggleAudio() {
  audioOn = !audioOn;
  if (!audioOn && window.speechSynthesis) window.speechSynthesis.cancel();
  btnAudio.textContent = audioOn ? '🔊' : '🔇';
  btnAudio.classList.toggle('muted', !audioOn);
}

btnStart.addEventListener('click', start);
btnSkip.addEventListener('click', skip);
btnReset.addEventListener('click', reset);
btnAudio.addEventListener('click', toggleAudio);
</script>
</body>
